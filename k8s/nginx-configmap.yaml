apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vue-admin
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        sendfile        on;
        keepalive_timeout  65;

        gzip on;
        gzip_static on;
        gzip_min_length 1k;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;
        gzip_vary on;
        gzip_proxied any;

        server {
            listen 80;
            server_name _;

            location / {
                root /app/dist;
                index index.html;
                try_files $uri $uri/ /index.html;

                location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable, max-age=31536000";
                    access_log off;
                }

                location = /index.html {
                    expires -1;
                    add_header Cache-Control "no-cache, must-revalidate";
                }
            }

            location /api/ {
                proxy_pass http://server:3000/api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /uploads/ {
                proxy_pass http://server:3000/uploads/;
                proxy_set_header Host $host;
                expires 7d;
                add_header Cache-Control "public, max-age=604800";
            }
        }
    }