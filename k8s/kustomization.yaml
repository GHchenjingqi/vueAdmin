apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vue-admin

resources:
  - namespace.yaml
  - configmap.yaml
  - nginx-configmap.yaml
  - mysql-statefulset.yaml
  - redis-deployment.yaml
  - server-deployment.yaml
  - frontend-deployment.yaml
  - ingress.yaml

secretGenerator:
  - name: app-secrets
    type: Opaque
    literals:
      - JWT_SECRET=please-set-via-external-secrets-or-env
      - DB_PASSWORD=please-set-via-external-secrets-or-env