version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    # 大版本更新需要手动评估，避免破坏性变更
    ignore:
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "element-plus"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pinia"
        update-types: ["version-update:semver-major"]
    # 对关键依赖使用分组 PR
    groups:
      lint:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint*"
      test:
        patterns:
          - "vitest*"
          - "@vitest*"
          - "jsdom"
      build:
        patterns:
          - "vite*"
          - "@vitejs*"
          - "unplugin*"

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    ignore:
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sequelize"
        update-types: ["version-update:semver-major"]
    groups:
      lint:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
      test:
        patterns:
          - "vitest*"
          - "@vitest*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"