name: CI

on:
  push:
    branches: [main, master, dev, develop]
  pull_request:
    branches: [main, master, dev, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run vue-tsc
        run: npm run typecheck

      - name: Install server dependencies
        working-directory: server
        run: npm ci --ignore-scripts

      - name: Run server typecheck
        working-directory: server
        run: npm run typecheck

  # Phase 0.1: 依赖安全扫描
  # 扫描前端和后端依赖中的已知漏洞，阻断 high/critical 级别的合并
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Install server dependencies
        working-directory: server
        run: npm ci --ignore-scripts

      - name: Run npm audit (frontend)
        run: npm audit --audit-level=high

      - name: Run npm audit (server)
        working-directory: server
        run: npm audit --audit-level=high

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm run test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, audit, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # Phase 5.2: Lighthouse 性能检查
  lighthouse:
    name: Lighthouse Check
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./budget.json

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: vue_admin
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Install server dependencies
        working-directory: server
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare server env
        run: |
          cat > server/.env <<'EOF'
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=vue_admin
          DB_USER=root
          DB_PASSWORD=root
          SERVER_PORT=5173
          JWT_SECRET=test_jwt_secret_key_for_ci
          ALLOWED_ORIGINS=https://localhost:5173,http://localhost:5173,https://127.0.0.1:5173,http://127.0.0.1:5173
          REDIS_ENABLED=false
          LOG_LEVEL=error
          EOF
          # 去掉 heredoc 缩进空格
          sed -i 's/^          //' server/.env

      - name: Start backend server
        run: |
          nohup npm run dev > /tmp/vue-admin-e2e.log 2>&1 &
          echo $! > /tmp/vue-admin-e2e.pid
          # 等待 HTTPS 就绪（自签名证书）
          for i in $(seq 1 60); do
            if curl -k -fsS https://localhost:5173/health >/dev/null 2>&1; then
              echo "server ready on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "server failed to start" >&2
          cat /tmp/vue-admin-e2e.log || true
          exit 1
        env:
          NODE_ENV: development
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: vue_admin
          DB_USER: root
          DB_PASSWORD: root
          SERVER_PORT: 5173
          JWT_SECRET: test_jwt_secret_key_for_ci
          ALLOWED_ORIGINS: https://localhost:5173,http://localhost:5173
          REDIS_ENABLED: 'false'

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: https://localhost:5173

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-log
          path: /tmp/vue-admin-e2e.log
          retention-days: 7

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e-report/
          retention-days: 7

  # Phase 2.2: dev/develop 分支推送自动部署到 Staging
  # 仅依赖 build + e2e-tests 全绿后触发；需要仓库 environments/staging 中配置
  # STAGING_HOST / STAGING_USER / STAGING_SSH_KEY 三个 secrets。
  # Dockerfile 在镜像内从源码重建前后端，故传输整份源码（排除 .git/node_modules/dist）。
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Remove .git to speed up transfer
        run: rm -rf .git

      - name: Upload source to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "."
          target: "/app/vue-admin"
          rm: true
          exclude: ".git,.github,node_modules,dist,coverage,e2e-report"

      - name: Deploy via docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /app/vue-admin
            docker compose down
            docker compose up -d --build
            docker system prune -f
