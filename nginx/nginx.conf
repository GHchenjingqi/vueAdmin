worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ==================== Gzip 压缩 ====================
    gzip on;
    # 启用静态预压缩文件（需构建时生成 .gz 文件）
    gzip_static on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss image/svg+xml;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "MSIE [1-6]\.";

    server {
        listen 80;
        server_name localhost;

        # ==================== 前端静态资源 ====================
        location / {
            root /app/dist;
            index index.html;

            # SPA 路由回退
            try_files $uri $uri/ /index.html;

            # 对带有 hash 的资源文件设置强缓存（Vite 默认在文件名中注入 hash）
            location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable, max-age=31536000";
                access_log off;
                # 先尝试 .gz 预压缩文件
                gzip_static on;
            }

            # index.html 不做缓存（确保每次获取最新版本）
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-cache, must-revalidate";
            }
        }

        # ==================== API 代理到后端 ====================
        location /api/ {
            proxy_pass http://server:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # API 不缓存
            add_header Cache-Control "no-store";
        }

        # ==================== 上传文件 ====================
        location /uploads/ {
            proxy_pass http://server:3000/uploads/;
            proxy_set_header Host $host;

            # 上传资源缓存 7 天
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # ==================== SSE 长连接（通知推送）====================
        location /api/notifications/stream {
            proxy_pass http://server:3000/api/notifications/stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE 必需配置
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding on;
        }
    }
}